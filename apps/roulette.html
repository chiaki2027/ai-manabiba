<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>会話トピック・ルーレット</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
<style>body{margin:0;padding:24px 12px;background:#F3EDE3;min-height:100vh;box-sizing:border-box}</style>
</head>
<body><div id="app">
  <style>
    #app {
      --bg: #FFF8F0;
      --ink: #22324F;
      --sub: #6B7A90;
      --card: #FFFFFF;
      --line: #ECE3D6;
      --shadow: 20px 24px 60px rgba(34,50,79,.10);
      font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", "Meiryo",
                   -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 80% -10%, #FFEFD8 0%, transparent 60%),
        radial-gradient(900px 500px at -10% 110%, #E9F5F3 0%, transparent 55%),
        var(--bg);
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 20px 40px;
      border-radius: 24px;
      box-sizing: border-box;
    }
    #app * { box-sizing: border-box; }

    .kicker {
      font-size: 12px; letter-spacing: .28em; text-transform: uppercase;
      color: #C99A4E; font-weight: 700; margin: 0 0 6px;
    }
    .title {
      font-size: 27px; font-weight: 800; margin: 0 0 4px; line-height: 1.2;
      letter-spacing: .01em;
    }
    .lead { margin: 0 0 22px; color: var(--sub); font-size: 14px; }

    .stage { position: relative; width: min(78vw, 340px); margin: 0 auto; }
    .pointer {
      position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; z-index: 3;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 26px solid var(--ink);
      filter: drop-shadow(0 4px 4px rgba(34,50,79,.25));
    }
    .wheelWrap {
      border-radius: 50%; padding: 10px; background: #fff;
      box-shadow: var(--shadow); position: relative;
    }
    svg.wheel { display: block; width: 100%; height: auto; }
    #rot { transform-origin: 100px 100px; transition: transform 4.2s cubic-bezier(.15,.9,.2,1); }
    .seg-label { font-size: 9px; font-weight: 700; fill: #fff; }
    .hub {
      position: absolute; inset: 0; margin: auto; width: 60px; height: 60px;
      border-radius: 50%; background: #fff; box-shadow: 0 4px 14px rgba(34,50,79,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; z-index: 2;
    }

    .spinBtn {
      display: block; margin: 26px auto 0; border: none; cursor: pointer;
      background: var(--ink); color: #fff; font-size: 17px; font-weight: 800;
      font-family: inherit; padding: 15px 42px; border-radius: 999px;
      box-shadow: 0 10px 24px rgba(34,50,79,.28); transition: transform .12s, box-shadow .12s;
      letter-spacing: .04em;
    }
    .spinBtn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(34,50,79,.32); }
    .spinBtn:active { transform: translateY(0); }
    .spinBtn:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }
    .spinBtn:focus-visible { outline: 3px solid #F2B705; outline-offset: 3px; }

    .result {
      margin-top: 26px; background: var(--card); border: 1px solid var(--line);
      border-radius: 20px; padding: 22px 22px 24px; box-shadow: var(--shadow);
      opacity: 0; transform: translateY(10px) scale(.98);
      transition: opacity .35s, transform .35s;
    }
    .result.show { opacity: 1; transform: none; }
    .result .badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: #fff; padding: 5px 12px;
      border-radius: 999px; margin-bottom: 12px;
    }
    .result h2 { margin: 0 0 14px; font-size: 22px; font-weight: 800; }
    .result .qh { font-size: 12px; color: var(--sub); font-weight: 700; margin: 0 0 8px; letter-spacing:.06em; }
    .chip {
      display: block; background: #FBF6EE; border: 1px solid var(--line);
      border-radius: 12px; padding: 12px 14px; margin-top: 8px;
      font-size: 15px; line-height: 1.5;
    }
    .empty { color: var(--sub); font-size: 15px; text-align: center; padding: 6px 0; }

    .fx { position: fixed; width: 9px; height: 9px; border-radius: 2px; pointer-events: none; z-index: 9; }

    @media (prefers-reduced-motion: reduce) {
      #rot { transition: transform .8s ease-out; }
    }
  </style>

  <p class="kicker">Icebreaker</p>
  <h1 class="title">会話トピック・ルーレット</h1>
  <p class="lead">ボタンを押すと、留学生との会話練習のお題が1つ選ばれます。授業のウォームアップにどうぞ。</p>

  <div class="stage">
    <div class="pointer"></div>
    <div class="wheelWrap">
      <svg class="wheel" viewBox="0 0 200 200" role="img" aria-label="会話トピックのルーレット">
        <g id="rot"></g>
      </svg>
    </div>
    <div class="hub" aria-hidden="true">💬</div>
  </div>

  <button class="spinBtn" id="spin">まわす</button>

  <div class="result" id="result">
    <p class="empty" id="empty">まだお題は出ていません。「まわす」を押してください。</p>
    <div id="content" style="display:none">
      <span class="badge" id="badge"></span>
      <h2 id="topic"></h2>
      <p class="qh">きっかけの質問</p>
      <span class="chip" id="q1"></span>
      <span class="chip" id="q2"></span>
    </div>
  </div>

  <script>
    (function () {
      var app = document.getElementById('app');
      var topics = [
        { s:"食べ物", t:"好きな食べ物", c:"#EF6461",
          q1:"母国の料理で、いちばん好きなものは何ですか？",
          q2:"日本で食べてみたい料理はありますか？" },
        { s:"週末", t:"週末の過ごし方", c:"#2AA19A",
          q1:"先週の週末は、何をしましたか？",
          q2:"次の休みに、してみたいことはありますか？" },
        { s:"旅行", t:"旅行", c:"#6C8AE4",
          q1:"これまでで、いちばんよかった場所はどこですか？",
          q2:"これから行ってみたい国はどこですか？" },
        { s:"映画・音楽", t:"映画と音楽", c:"#9A5BB0",
          q1:"最近見た映画や動画で、面白かったものは？",
          q2:"好きな歌手やバンドはいますか？" },
        { s:"子どもの頃", t:"子どものころ", c:"#E8862E",
          q1:"子どものころの夢は何でしたか？",
          q2:"よくしていた遊びを教えてください。" },
        { s:"日本", t:"日本の好きなところ", c:"#3AA655",
          q1:"日本に来て、いちばん驚いたことは？",
          q2:"好きな日本語のことばはありますか？" },
        { s:"季節", t:"季節", c:"#D64E7E",
          q1:"好きな季節はいつですか？　それはどうしてですか？",
          q2:"その季節に、よくすることは何ですか？" },
        { s:"もし〜", t:"もし〜だったら", c:"#F2B705",
          q1:"もし1億円あったら、何をしますか？",
          q2:"もし1日、自由な休みがあったら？" }
      ];

      var N = topics.length, seg = 360 / N, R = 95, CX = 100, CY = 100;
      var g = document.getElementById('rot');
      var NS = "http://www.w3.org/2000/svg";

      function pt(deg, r) { // deg = clockwise from top
        var a = deg * Math.PI / 180;
        return [CX + r * Math.sin(a), CY - r * Math.cos(a)];
      }
      for (var i = 0; i < N; i++) {
        var a0 = i * seg, a1 = (i + 1) * seg;
        var p0 = pt(a0, R), p1 = pt(a1, R);
        var path = document.createElementNS(NS, "path");
        path.setAttribute("d", "M" + CX + "," + CY + " L" + p0[0].toFixed(2) + "," + p0[1].toFixed(2) +
          " A" + R + "," + R + " 0 0 1 " + p1[0].toFixed(2) + "," + p1[1].toFixed(2) + " Z");
        path.setAttribute("fill", topics[i].c);
        path.setAttribute("stroke", "#fff");
        path.setAttribute("stroke-width", "1.5");
        g.appendChild(path);
        var lp = pt(a0 + seg / 2, 62);
        var txt = document.createElementNS(NS, "text");
        txt.setAttribute("x", lp[0].toFixed(1));
        txt.setAttribute("y", lp[1].toFixed(1));
        txt.setAttribute("text-anchor", "middle");
        txt.setAttribute("dominant-baseline", "middle");
        txt.setAttribute("class", "seg-label");
        txt.textContent = topics[i].s;
        g.appendChild(txt);
      }

      var btn = document.getElementById('spin');
      var resultBox = document.getElementById('result');
      var empty = document.getElementById('empty');
      var content = document.getElementById('content');
      var rotation = 0, spinning = false;

      function reveal(idx) {
        var d = topics[idx];
        document.getElementById('badge').textContent = "TOPIC " + (idx + 1);
        document.getElementById('badge').style.background = d.c;
        document.getElementById('topic').textContent = d.t;
        document.getElementById('q1').textContent = d.q1;
        document.getElementById('q2').textContent = d.q2;
        empty.style.display = 'none';
        content.style.display = 'block';
        resultBox.classList.remove('show');
        void resultBox.offsetWidth;
        resultBox.classList.add('show');
        confetti(d.c);
      }

      function confetti(color) {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        var colors = [color, '#F2B705', '#2AA19A', '#6C8AE4', '#EF6461'];
        var rect = document.querySelector('.hub').getBoundingClientRect();
        var ox = rect.left + rect.width / 2, oy = rect.top + rect.height / 2;
        for (var k = 0; k < 26; k++) {
          (function () {
            var el = document.createElement('div');
            el.className = 'fx';
            el.style.background = colors[k % colors.length];
            el.style.left = ox + 'px'; el.style.top = oy + 'px';
            document.body.appendChild(el);
            var ang = Math.random() * Math.PI * 2, dist = 80 + Math.random() * 120;
            var dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist - 40;
            el.animate([
              { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
              { transform: 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (Math.random()*540) + 'deg)', opacity: 0 }
            ], { duration: 900 + Math.random() * 500, easing: 'cubic-bezier(.1,.7,.3,1)' })
              .onfinish = function () { el.remove(); };
          })();
        }
      }

      btn.addEventListener('click', function () {
        if (spinning) return;
        spinning = true; btn.disabled = true; btn.textContent = 'まわしています…';
        var target = Math.floor(Math.random() * N);
        var center = target * seg + seg / 2;      // clockwise-from-top angle of segment center
        var jitter = (Math.random() * 2 - 1) * (seg / 2 - 6);
        var spins = 5 + Math.floor(Math.random() * 2);
        var base = rotation - (rotation % 360);    // normalize
        rotation = base + spins * 360 + (360 - center) + jitter;
        g.style.transform = 'rotate(' + rotation + 'deg)';
        var done = function () {
          g.removeEventListener('transitionend', done);
          spinning = false; btn.disabled = false; btn.textContent = 'もう一回まわす';
          reveal(target);
        };
        g.addEventListener('transitionend', done);
      });
    })();
  </script>
</div>

</body>
</html>
